<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&D New Development Pipeline Dashboard</title>
    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --dark-bg: #1b4332;
            --text-dark: #212529;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        header {
            background-color: var(--dark-bg);
            color: #ffffff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 13px;
            color: #b7e4c7;
            margin-top: 4px;
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* KPI Cards Grid Layout */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .kpi-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            border-left: 5px solid var(--primary-green);
            text-align: center;
            transition: transform 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
        }

        .kpi-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c757d;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--dark-bg);
        }

        .kpi-card.percentage .kpi-value {
            color: var(--primary-green);
        }

        /* Table Design */
        .table-section {
            background: #ffffff;
            border-radius: 8px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        .table-section h2 {
            margin-top: 0;
            font-size: 18px;
            color: var(--dark-bg);
            border-bottom: 2px solid var(--light-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--primary-green);
            color: #ffffff;
            font-weight: 600;
            padding: 12px 15px;
            font-size: 14px;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
            font-size: 15px;
        }

        tr:nth-child(even) {
            background-color: #fdfdfd;
        }

        tr.total-row {
            background-color: var(--light-green) !important;
            font-weight: 700;
        }

        tr.total-row td {
            border-top: 2px solid var(--primary-green);
            color: var(--dark-bg);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>R&D New Development Pipeline Analysis</h1>
            <div class="subtitle">Management Intelligence Dashboard · Live Sync</div>
        </div>
    </header>

    <div class="container">
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-title">Total Developments Received</div>
                <div class="kpi-value" id="totalReceived">...</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Total Completed Number</div>
                <div class="kpi-value" id="totalCompleted">...</div>
            </div>
            <div class="kpi-card percentage">
                <div class="kpi-title">Overall Completion %</div>
                <div class="kpi-value" id="overallRate">...</div>
            </div>
        </div>

        <div class="table-section">
            <h2>Monthly Volume Breakdown</h2>
            <div id="loadingMessage" class="loading">Fetching records from Google Sheets...</div>
            <table id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Total Received</th>
                        <th>Completed Number</th>
                        <th>Completion %</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // ⚠️ PASTE YOUR COPIED GOOGLE WEB APP URL BETWEEN THE QUOTES BELOW:
        const API_URL = "https://script.google.com/macros/s/AKfycbzuNJajs_YL1Qx0Emv_wClWWB-uuOIdGvskHd4JCmsi_8zo546KAfPGdYYCngwghplS/exec";

        async function fetchDashboardData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // Populate Top Level Cards
                document.getElementById('totalReceived').innerText = data.totalReceived.toLocaleString();
                document.getElementById('totalCompleted').innerText = data.totalCompleted.toLocaleString();
                document.getElementById('overallRate').innerText = data.overallCompletionRate;

                // Populate Summary Breakdown Rows
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = ''; // Clear template placeholders

                data.monthlyBreakdown.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${row.month}</strong></td>
                        <td>${row.received}</td>
                        <td>${row.completed}</td>
                        <td><strong>${row.rate}</strong></td>
                    `;
                    tableBody.appendChild(tr);
                });

                // Inject Summary Calculation Bottom Row
                const totalTr = document.createElement('tr');
                totalTr.className = 'total-row';
                totalTr.innerHTML = `
                    <td>TOTAL YTD</td>
                    <td>${data.totalReceived}</td>
                    <td>${data.totalCompleted}</td>
                    <td>${data.overallCompletionRate}</td>
                `;
                tableBody.appendChild(totalTr);

                // UI Visibility Toggle
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';

            } catch (error) {
                console.error("Dashboard Fetch Error: ", error);
                document.getElementById('loadingMessage').innerText = "Failed to synchronize live data. Check Web App permissions.";
            }
        }

        // Initialize connection loop on window load
        window.onload = fetchDashboardData;
    </script>
</body>
</html>
